version: 1
platform: ios

rules:
  # ── Retain Cycles ────────────────────────────────────────────────
  - id: preflight/ios/retain-cycle-closure
    severity: high
    description: >
      Closure captures self strongly. If self holds the closure, this forms
      a retain cycle. Use [weak self] or [unowned self].
    example_violation: |
      viewModel.onUpdate = {
          self.tableView.reloadData()  # strong capture
      }
    example_fix: |
      viewModel.onUpdate = { [weak self] in
          self?.tableView.reloadData()
      }

  - id: preflight/ios/delegate-strong
    severity: high
    description: >
      Delegate property is not weak. Parent holds child; child holds delegate
      back to parent — retain cycle. Delegates must be weak.
    example_violation: "var delegate: UserDelegate?"
    example_fix: "weak var delegate: UserDelegate?"

  - id: preflight/ios/timer-strong-target
    severity: high
    description: >
      Timer.scheduledTimer(withTimeInterval:target:) holds a strong reference
      to target. If the owning object is the target, it will never deallocate.
      Use the block-based API with [weak self] instead.
    example_violation: |
      Timer.scheduledTimer(timeInterval: 1.0, target: self,
                           selector: #selector(tick), userInfo: nil, repeats: true)
    example_fix: |
      Timer.scheduledTimer(withTimeInterval: 1.0, repeats: true) { [weak self] _ in
          self?.tick()
      }

  # ── Threading ────────────────────────────────────────────────────
  - id: preflight/ios/ui-off-main-thread
    severity: high
    description: >
      UIKit and SwiftUI updates must happen on the main thread. Calling UI APIs
      from a background queue causes undefined behavior and crashes.
    example_violation: |
      DispatchQueue.global().async {
          self.label.text = result  # UIKit off main thread
      }
    example_fix: |
      DispatchQueue.global().async {
          DispatchQueue.main.async {
              self.label.text = result
          }
      }

  - id: preflight/ios/main-actor-missing
    severity: medium
    description: >
      Function updates UI state but is not marked @MainActor. In Swift
      Concurrency this is not enforced at compile time on non-isolated types.

  # ── Memory Safety ────────────────────────────────────────────────
  - id: preflight/ios/notification-observer-leak
    severity: high
    description: >
      NotificationCenter.addObserver called without a corresponding
      removeObserver in deinit. Pre-iOS 9 observers are never released.
    example_violation: |
      override func viewDidLoad() {
          NotificationCenter.default.addObserver(self, selector: #selector(handle),
                                                 name: .UIApplicationDidBecomeActive,
                                                 object: nil)
          # no removeObserver anywhere
      }
    example_fix: |
      deinit {
          NotificationCenter.default.removeObserver(self)
      }

  - id: preflight/ios/forced-unwrap
    severity: high
    description: >
      Force unwrap (!) crashes at runtime if the value is nil.
      Use guard let, if let, or ?? with a safe default.
    paths_ignore:
      - "**/*Tests.swift"
      - "**/*Spec.swift"
      - "**/Mocks/**"

  # ── SwiftUI ──────────────────────────────────────────────────────
  - id: preflight/swiftui/observed-not-stateobject
    severity: high
    description: >
      @ObservedObject used for an object created inside this view.
      The view does not own the object's lifetime — SwiftUI can recreate the
      view and lose state. Use @StateObject for objects owned by this view.
    example_violation: |
      struct ContentView: View {
          @ObservedObject var vm = UserViewModel()  # view doesn't own lifetime
      }
    example_fix: |
      struct ContentView: View {
          @StateObject var vm = UserViewModel()
      }

  - id: preflight/swiftui/state-in-nonview
    severity: medium
    description: >
      @State declared outside a View struct. @State is managed by SwiftUI's
      rendering engine and only works correctly inside View types.

  # ── Security ─────────────────────────────────────────────────────
  - id: preflight/ios/sensitive-in-userdefaults
    severity: high
    description: >
      Sensitive data (tokens, passwords, PII) stored in UserDefaults.
      UserDefaults is unencrypted plist storage. Use the Keychain instead.
    keywords:
      - token
      - password
      - secret
      - apiKey
      - authToken

  - id: preflight/ios/hardcoded-secret
    severity: high
    description: >
      API key, secret, or credential hardcoded in source. Rotate immediately
      and move to a secrets manager or backend proxy.

  # ── Force Unwrap / Cast ──────────────────────────────────────────
  - id: preflight/ios/force-cast
    severity: high
    description: >
      Force cast (as!) crashes at runtime if the type does not match.
      Use conditional cast (as?) with a guard or if let instead.
    example_violation: |
      let vc = storyboard.instantiateViewController(withIdentifier: "Home") as! HomeViewController
    example_fix: |
      guard let vc = storyboard.instantiateViewController(withIdentifier: "Home") as? HomeViewController else { return }

  # ── Swift Concurrency ────────────────────────────────────────────
  - id: preflight/ios/task-not-stored
    severity: high
    description: >
      Task { } created without storing the handle. The task cannot be
      cancelled — it will run until completion even after the owning object
      deallocates, potentially causing use-after-free or unintended side effects.
    example_violation: |
      func load() {
          Task { await self.fetchData() }   // handle discarded
      }
    example_fix: |
      private var loadTask: Task<Void, Never>?
      func load() {
          loadTask = Task { await self.fetchData() }
      }
      deinit { loadTask?.cancel() }

  - id: preflight/ios/actor-isolation-violation
    severity: high
    description: >
      Actor-isolated property or method accessed from outside the actor without
      await. This is a data race — Swift 6 will reject it at compile time.
    example_violation: |
      actor DataStore { var cache: [String: Data] = [:] }
      let value = store.cache["key"]    // missing await
    example_fix: |
      let value = await store.cache["key"]

  - id: preflight/ios/sendable-violation
    severity: high
    description: >
      Non-Sendable type passed across concurrency boundaries (actor, Task, or
      detached Task). This is a data race that Swift 6 strict concurrency will
      flag. Mark the type Sendable or use an actor to protect it.
    example_violation: |
      class UserSession { var token: String = "" }   // not Sendable
      Task { processSession(session) }                // captured across boundary
    example_fix: |
      final class UserSession: Sendable { let token: String ... }

  - id: preflight/ios/continuation-resume-count
    severity: high
    description: >
      withCheckedContinuation or withUnsafeContinuation where resume may be
      called zero times (forgotten in an error branch) or more than once
      (called in both the success and the error path). Either causes undefined
      behaviour or a crash.
    example_violation: |
      withCheckedContinuation { continuation in
          fetchData { result, error in
              if let error { continuation.resume(throwing: error) }
              continuation.resume(returning: result!)   // called twice on error
          }
      }
    example_fix: |
      withCheckedThrowingContinuation { continuation in
          fetchData { result, error in
              if let error { continuation.resume(throwing: error) } else {
                  continuation.resume(returning: result!)
              }
          }
      }

  - id: preflight/ios/main-actor-assumed
    severity: medium
    description: >
      Function updates UI state but is not marked @MainActor and is called
      from an async context. Without @MainActor the call may arrive on a
      background thread, causing UIKit threading violations.
    example_violation: |
      func updateUI() { label.text = "done" }   // not @MainActor
      Task { await model.load(); updateUI() }    // background thread
    example_fix: |
      @MainActor func updateUI() { label.text = "done" }

  # ── Error Handling ────────────────────────────────────────────────
  - id: preflight/ios/try-question-swallows-error
    severity: medium
    description: >
      try? discards the thrown error entirely. In async or networking code
      this silently hides failures. Propagate with try or catch and log/handle
      the specific error.
    example_violation: |
      let decoded = try? JSONDecoder().decode(User.self, from: data)
    example_fix: |
      do {
          let decoded = try JSONDecoder().decode(User.self, from: data)
      } catch {
          logger.error("Decode failed: \(error)")
      }

  - id: preflight/ios/escaping-completion-not-called
    severity: high
    description: >
      @escaping completion handler may not be called on all code paths —
      missing call in an error branch or early return. Callers that rely on
      the completion to continue will hang indefinitely.
    example_violation: |
      func fetch(completion: @escaping (Result<Data, Error>) -> Void) {
          guard isReachable else { return }   // completion never called
          session.dataTask(...) { data, _, error in
              if let error { return }         // completion never called
              completion(.success(data!))
          }.resume()
      }
    example_fix: |
      guard isReachable else { completion(.failure(NetworkError.offline)); return }
